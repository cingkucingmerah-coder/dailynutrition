<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#1e1b2e;
  color:white;
  font-family:sans-serif;
}

button{
  padding:15px 30px;
  margin:10px;
  font-size:18px;
  border:none;
  border-radius:30px;
  cursor:pointer;
}

#kabur{
  position:absolute;
}
</style>
</head>

<body>

<h1>Kamu capek?</h1>
<button onclick="alert('Kepencet Capek')">Capek</button>
<button id="kabur">Enggak capek</button>

<script>
const btn = document.getElementById("kabur");

btn.addEventListener("mouseenter", ()=>{
  const x = Math.random() * (window.innerWidth - 150);
  const y = Math.random() * (window.innerHeight - 60);
  btn.style.left = x + "px";
  btn.style.top = y + "px";
});
</script>

</body>
</html>
