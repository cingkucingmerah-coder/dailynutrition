<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Nutrition 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  padding:0;
  background:linear-gradient(135deg,#1e1b2e,#2b2344);
  font-family:'Poppins',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:#f3eaff;
  overflow:hidden;
  text-align:center;
  transition:background 3s ease;
}

.container{
  max-width:750px;
  padding:40px;
}

h1{
  font-family:'Playfair Display',serif;
  font-size:32px;
}

button{
  padding:12px 25px;
  border-radius:30px;
  border:none;
  cursor:pointer;
  font-size:14px;
  margin:10px;
  transition:0.3s;
}

#okBtn{
  background:#ff8fb1;
  color:white;
  position:absolute;
}

#honestBtn{
  background:#c8a2ff;
  color:white;
  display:none;
}

.hidden{
  display:none;
}

#teaseText{
  margin-top:20px;
  font-style:italic;
  opacity:0;
  transition:opacity 1s ease;
}

.show{
  opacity:1 !important;
}

#page2, #letterPage{
  display:none;
  line-height:1.8;
}

#letter{
  opacity:0;
  transition:opacity 2s ease;
}

#finalMessage{
  display:none;
  font-family:'Playfair Display',serif;
  font-size:34px;
  color:#444;
  opacity:0;
  transition:opacity 3s ease;
}
</style>
</head>

<body>

<div class="container" id="page1">
  <h1>Mas Farhan… 🤍</h1>
  <p>Hari ini kamu okay?</p>

  <button id="okBtn">Okay</button>
  <button onclick="goNext()">Belum okay</button>

  <div id="teaseText">bohong ya kamu…</div>
  <button id="honestBtn" onclick="goNext()">yaudah… jujur aja</button>
</div>

<div class="container" id="page2">
  <h1>It's okay kalau belum okay 🤍</h1>
  <p>Kamu nggak harus selalu kuat.</p>
  <button onclick="showLetter()">Lanjut 🤍</button>
</div>

<div class="container" id="letterPage">
  <h1>Untuk Mas Farhan 🤍</h1>
  <div id="letter"></div>
</div>

<div id="finalMessage">
  aku di sini ya…
</div>

<audio autoplay loop>
  <source src="tulus-diri.mp3" type="audio/mpeg">
</audio>

<script>
const okBtn = document.getElementById("okBtn");
const teaseText = document.getElementById("teaseText");
const honestBtn = document.getElementById("honestBtn");

okBtn.addEventListener("mouseover", () => {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);
  okBtn.style.left = x + "px";
  okBtn.style.top = y + "px";

  teaseText.classList.add("show");
  honestBtn.style.display = "inline-block";
});

function goNext(){
  document.getElementById("page1").style.display="none";
  document.getElementById("page2").style.display="block";
}

function showLetter(){
  document.getElementById("page2").style.display="none";
  document.getElementById("letterPage").style.display="block";

  const text = `
Mas,

Terima kasih ya sudah sekuat itu.
Terima kasih sudah bertahan di hari-hari yang berat.
Terima kasih sudah tetap berdiri walau kadang rasanya ingin menyerah.

Aku lihat perjuanganmu.
Aku lihat lelahmu.
Dan aku tetap bangga sama kamu.

Kamu nggak harus selalu kuat untuk dianggap berharga.
Kamu sudah cukup.
Selalu cukup.
`;

  let i = 0;
  const speed = 30;
  const letterDiv = document.getElementById("letter");

  function typeWriter(){
    if(i < text.length){
      letterDiv.innerHTML += text.charAt(i);
      i++;
      setTimeout(typeWriter, speed);
    } else {
      setTimeout(showFinal, 2000);
    }
  }

  letterDiv.style.opacity = "1";
  typeWriter();
}

function showFinal(){
  document.body.style.background = "#ffffff";
  document.getElementById("letterPage").style.display="none";
  const finalMsg = document.getElementById("finalMessage");
  finalMsg.style.display="block";
  setTimeout(() => {
    finalMsg.style.opacity="1";
  }, 500);
}
</script>

</body>
</html>
